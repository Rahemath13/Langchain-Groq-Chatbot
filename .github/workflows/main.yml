# .github/workflows/main.yml

name: Deploy to Heroku

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout Repository
        uses: actions/checkout@v4          # ✅ Latest stable version

      # Step 2: Login to Heroku Container Registry
      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          echo "$HEROKU_API_KEY" | docker login \
            --username=_ \
            --password-stdin \
            registry.heroku.com

      # Step 3: Build Docker Image
      - name: Build Docker Image
        run: |
          docker build \
            --no-cache \
            -t registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web \
            .

      # Step 4: Push Image to Heroku Registry
      - name: Push Docker Image
        run: |
          docker push registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web

      # Step 5: Release the image (activate it on Heroku)
      - name: Release Image on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          IMAGE_ID=$(docker inspect \
            registry.heroku.com/${{ secrets.HEROKU_APP_NAME }}/web \
            --format={{.Id}})

          curl -n -X PATCH \
            https://api.heroku.com/apps/${{ secrets.HEROKU_APP_NAME }}/formation \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer $HEROKU_API_KEY" \
            -d "{\"updates\":[{\"type\":\"web\",\"docker_image\":\"$IMAGE_ID\"}]}"