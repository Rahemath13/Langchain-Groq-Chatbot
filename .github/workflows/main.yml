name: Deploy to Heroku

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ✅ Convert app name to lowercase — prevents this error permanently
      - name: Set Lowercase App Name
        run: |
          echo "HEROKU_APP=$(echo '${{ secrets.HEROKU_APP_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          echo "$HEROKU_API_KEY" | docker login \
            --username=_ \
            --password-stdin \
            registry.heroku.com

      - name: Build Docker Image
        run: |
          docker build \
            --no-cache \
            -t registry.heroku.com/${{ env.HEROKU_APP }}/web \
            .

      - name: Push Docker Image
        run: |
          docker push registry.heroku.com/${{ env.HEROKU_APP }}/web

      - name: Release Image on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          IMAGE_ID=$(docker inspect \
            registry.heroku.com/${{ env.HEROKU_APP }}/web \
            --format={{.Id}})

          curl -n -X PATCH \
            https://api.heroku.com/apps/${{ env.HEROKU_APP }}/formation \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer $HEROKU_API_KEY" \
            -d "{\"updates\":[{\"type\":\"web\",\"docker_image\":\"$IMAGE_ID\"}]}"