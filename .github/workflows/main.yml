name: Deploy to Heroku

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ✅ Set lowercase app name
      - name: Set Lowercase App Name
        run: |
          echo "HEROKU_APP=$(echo '${{ secrets.HEROKU_APP_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ✅ Install Heroku CLI
      - name: Install Heroku CLI
        run: |
          curl https://cli-assets.heroku.com/install.sh | sh

      # ✅ Login using Heroku CLI (handles credentials correctly)
      - name: Login to Heroku Container Registry via CLI
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:login

      # ✅ Build image with correct tag
      - name: Build Docker Image
        run: |
          docker build \
            --no-cache \
            -t registry.heroku.com/${{ env.HEROKU_APP }}/web \
            .

      # ✅ Push using Heroku CLI (no auth issues)
      - name: Push Docker Image
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:push web --app ${{ env.HEROKU_APP }}

      # ✅ Release using Heroku CLI
      - name: Release Image on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:release web --app ${{ env.HEROKU_APP }}